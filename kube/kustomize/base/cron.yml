apiVersion: batch/v1
kind: CronJob
metadata:
  name: session-cleanup
spec:
  schedule: "0 0 * * *" # every day at midnight
  concurrencyPolicy: Forbid # don't run if previous job is still running
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cleanup
              image: myapp:latest
              command: ["myapp", "cleanup-sessions"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: myapp-secrets
                      key: database_url

