name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: 1.25

    - name: Install dependencies
      run: go mod tidy

    - name: Run tests
      run: go test ./... -v

    - name: Build
      run: go build -v ./...

    - name: Install golangci-lint
      uses: golangci/golangci-lint-action@v4
      with:
        version: v1.60.0

    - name: Run linter
      run: golangci-lint run ./...


