syntax = "proto3";

package user.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/alkuwaiti/auth/pb/pbuser/v1;userv1";

service UserService {
  rpc Ping(google.protobuf.Empty) returns (google.protobuf.Empty) {}
  rpc RegisterUser(RegisterUserRequest) returns (User) {}
}

message RegisterUserRequest {
  string username = 1;
  string email = 2;
  string password = 3;
}

message User {
  string id = 1;
  string email = 2;
  string username = 3;
}
