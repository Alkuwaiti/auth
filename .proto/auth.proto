syntax = "proto3";

package auth.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/alkuwaiti/auth/pb/pbauth/v1;authv1";

service AuthService {
  rpc Ping(google.protobuf.Empty) returns (google.protobuf.Empty) {}
  rpc Login(LoginRequest) returns (LoginResponse) {}
  rpc RefreshToken(RefreshTokenRequest) returns (TokenPair) {}
  rpc Logout(RefreshTokenRequest) returns (google.protobuf.Empty) {}
  rpc ChangePassword(ChangePasswordRequest) returns (google.protobuf.Empty) {}
  rpc RegisterUser(RegisterUserRequest) returns (User) {}
  rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty) {}
  rpc EnrollMFAMethod(EnrollMFAMethodRequest) returns (EnrollMFAMethodResponse) {}
  rpc ConfirmMFAMethod(ConfirmMFAMethodRequest) returns (ConfirmMFAMethodResponse) {}
  rpc CompleteLoginMFA(CompleteLoginMFARequest) returns (TokenPair) {}
  rpc CreateStepUpChallenge(CreateStepUpChallengeRequest) returns (CreateStepUpChallengeResponse) {}
  rpc VerifyStepUpChallenge(VerifyStepUpChallengeRequest) returns (VerifyStepUpChallengeResponse) {}
  rpc ForgetPassword(ForgetPasswordRequest) returns (google.protobuf.Empty) {}
  rpc ResetPassword(ResetPasswordRequest) returns (google.protobuf.Empty) {}
  rpc BeginGoogleLogin(google.protobuf.Empty) returns (BeginGoogleLoginRequest) {}
  rpc CompleteGoogleLogin(CompleteGoogleLoginRequest) returns (TokenPair) {}
  rpc VerifyEmail(VerifyEmailRequest) returns (google.protobuf.Empty) {}
  rpc CreateEmailVerificationToken(CreateEmailVerificationTokenRequest) returns (google.protobuf.Empty) {}
  rpc StartPasskeyGeneration(google.protobuf.Empty) returns (StartPasskeyGenerationResponse) {}
  rpc VerifyPasskeyRegistration(VerifyPasskeyRegistrationRequest) returns (google.protobuf.Empty) {}
}

message LoginRequest {
  string email = 1;
  string password = 2;
  bool remember_me = 3;
}

message LoginResponse {
  bool mfa_required = 1;
  string challenge_id = 2;
  TokenPair tokens = 3;
}

message TokenPair {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
  string token_type = 4;
  string user_id = 5;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message ChangePasswordRequest {
  string old_password = 1;
  string new_password = 2;
}

message RegisterUserRequest {
  string email = 2;
  string password = 3;
}

message User {
  string id = 1;
  string email = 2;
}

message DeleteUserRequest {
  string user_id = 1;
  string reason = 2;
  string note = 3;
}

message EnrollMFAMethodRequest {
  string method = 1;
}

message MFAMethod {
  string id = 1;
  string type = 3;
  google.protobuf.Timestamp created_at = 5;
}

message EnrollMFAMethodResponse {
  MFAMethod method = 1;
  string setup_uri = 2;
}

message ConfirmMFAMethodRequest {
  string method_id = 1;
  string code = 2;
}

message ConfirmMFAMethodResponse {
  repeated string backup_codes = 1;
}

message CompleteLoginMFARequest {
  string challenge_id = 1;
  string code = 2;
}

message CreateStepUpChallengeRequest {
  string method_type = 1;
  string scope = 2;
}

message CreateStepUpChallengeResponse {
  string challenge_id = 1;
  string method_type = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message VerifyStepUpChallengeRequest {
  string challenge_id = 1;
  string code = 2;
}

message VerifyStepUpChallengeResponse {
  string step_up_token = 1;
  int64 expires_in = 2;
}

message ForgetPasswordRequest {
  string email = 1;
}

message ResetPasswordRequest {
  string token = 1;
  string new_password = 2;
}

message BeginGoogleLoginRequest {
  string auth_url = 1;
}

message CompleteGoogleLoginRequest {
  string code = 1;
  string state = 2;
}

message VerifyEmailRequest {
  string token = 1;
}

message CreateEmailVerificationTokenRequest {
  string email = 1;
}

message RP {
  string id = 1;
  string name = 2;
}

message UserEntity {
  string id = 1;
  string name = 2;
  string display_name = 3;
}

message PubKeyCredParam {
  string type = 1;
  int32 alg = 2;
}

message AuthenticatorSelection {
  string resident_key = 1;
  string user_verification = 2;
}

message ExcludeCredential {
  string id = 1;
  string type = 2;
}

message StartPasskeyGenerationResponse {
  string challenge = 1;
  RP rp = 2;
  UserEntity user = 3;
  repeated PubKeyCredParam pub_key_cred_params = 4;
  int32 timeout = 5;
  string attestation = 6;
  AuthenticatorSelection authenticator_selection = 7;
  repeated ExcludeCredential exclude_credentials = 8;
}

message PasskeyResponse {
  string attestation_object = 1;
  string authenticator_data = 2;
  string client_data_json = 3;
  string public_key = 4;
  int32 public_key_algorithm = 5;
  repeated string transports = 6;
}

message VerifyPasskeyRegistrationRequest {
  string id = 1;
  string raw_id = 2;
  string authenticator_attachment = 3;
  PasskeyResponse response = 4;
}
