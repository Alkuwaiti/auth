syntax = "proto3";

package auth.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/alkuwaiti/auth/pb/pbauth/v1;authv1";

service AuthService {
  rpc Ping(google.protobuf.Empty) returns (google.protobuf.Empty) {}
  rpc Login(LoginRequest) returns (LoginResponse) {}
  rpc RefreshToken(RefreshTokenRequest) returns (TokenPair) {}
  rpc Logout(RefreshTokenRequest) returns (google.protobuf.Empty) {}
  rpc ChangePassword(ChangePasswordRequest) returns (google.protobuf.Empty) {}
  rpc RegisterUser(RegisterUserRequest) returns (User) {}
  rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty) {}
  rpc EnrollMFAMethod(EnrollMFAMethodRequest) returns (EnrollMFAMethodResponse) {}
  rpc ConfirmMFAMethod(ConfirmMFAMethodRequest) returns (ConfirmMFAMethodResponse) {}
  rpc CompleteLoginMFA(CompleteLoginMFARequest) returns (TokenPair) {}
  rpc CreateStepUpChallenge(CreateStepUpChallengeRequest) returns (CreateStepUpChallengeResponse) {}
  rpc VerifyStepUpChallenge(VerifyStepUpChallengeRequest) returns (VerifyStepUpChallengeResponse) {}
  rpc ForgetPassword(ForgetPasswordRequest) returns (google.protobuf.Empty) {}
  rpc ResetPassword(ResetPasswordRequest) returns (google.protobuf.Empty) {}
  rpc BeginGoogleLogin(google.protobuf.Empty) returns (BeginGoogleLoginRequest) {}
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  bool mfa_required = 1;
  string challenge_id = 2;
  TokenPair tokens = 3;
}

message TokenPair {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
  string token_type = 4;
  string user_id = 5;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message ChangePasswordRequest {
  string old_password = 1;
  string new_password = 2;
}

message RegisterUserRequest {
  string username = 1;
  string email = 2;
  string password = 3;
}

message User {
  string id = 1;
  string email = 2;
  string username = 3;
}

message DeleteUserRequest {
  string user_id = 1;
  string reason = 2;
  string note = 3;
}

message EnrollMFAMethodRequest {
  string method = 1;
}

message MFAMethod {
  string id = 1;
  string type = 3;
  google.protobuf.Timestamp created_at = 5;
}

message EnrollMFAMethodResponse {
  MFAMethod method = 1;
  string setup_uri = 2;
}

message ConfirmMFAMethodRequest {
  string method_id = 1;
  string code = 2;
}

message ConfirmMFAMethodResponse {
  repeated string backup_codes = 1;
}

message CompleteLoginMFARequest {
  string challenge_id = 1;
  string code = 2;
}

message CreateStepUpChallengeRequest {
  string method_type = 1;
  string scope = 2;
}

message CreateStepUpChallengeResponse {
  string challenge_id = 1;
  string method_type = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message VerifyStepUpChallengeRequest {
  string challenge_id = 1;
  string code = 2;
}

message VerifyStepUpChallengeResponse {
  string step_up_token = 1;
  int64 expires_in = 2;
}

message ForgetPasswordRequest {
  string email = 1;
}

message ResetPasswordRequest {
  string token = 1;
  string new_password = 2;
}

message BeginGoogleLoginRequest {
  string auth_url = 1;
}
