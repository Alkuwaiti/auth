syntax = "proto3";

package auth.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/alkuwaiti/auth/pb/pbauth/v1;authv1";

service AuthService {
  rpc Ping(google.protobuf.Empty) returns (google.protobuf.Empty) {}
  rpc Login(LoginRequest) returns (TokenPair) {}
  rpc RefreshToken(RefreshTokenRequest) returns (TokenPair) {}
  rpc Logout(RefreshTokenRequest) returns (google.protobuf.Empty) {}
  rpc ChangePassword(ChangePasswordRequest) returns (google.protobuf.Empty) {}
  rpc RegisterUser(RegisterUserRequest) returns (User) {}
  rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty) {}
  rpc EnrollMFAMethod(EnrollMFAMethodRequest) returns (EnrollMFAMethodResponse) {}
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message TokenPair {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
  string token_type = 4;
  string user_id = 5;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message ChangePasswordRequest {
  string old_password = 1;
  string new_password = 2;
}

message RegisterUserRequest {
  string username = 1;
  string email = 2;
  string password = 3;
}

message User {
  string id = 1;
  string email = 2;
  string username = 3;
}

message DeleteUserRequest {
  string user_id = 1;
  string reason = 2;
  string note = 3;
}

message EnrollMFAMethodRequest {
  string method = 1;
}

message MFAMethod {
  string id = 1;
  string user_id = 2;
  string type = 3;
  google.protobuf.Timestamp confirmed_at = 4;
  google.protobuf.Timestamp created_at = 5;
}

message EnrollMFAMethodResponse {
  MFAMethod method = 1;
  string setup_uri = 2;
}
